<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link rel="icon" type="image/png" href="img/k3.png">
    <link rel="apple-touch-icon" href="img/k3.png">
    <link rel="manifest" href="site.webmanifest">
    <meta name="theme-color" content="#067BC2">
    <title>Testimonials — Youniverse</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;0,700;1,400&family=EB+Garamond:ital,wght@0,400;0,600;1,400&family=Montserrat:wght@300;400;500;600;700&family=Source+Sans+3:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/base.css">
    <link rel="stylesheet" href="css/cards.css">
    <link rel="stylesheet" href="css/blog.css">
    <link rel="stylesheet" href="css/testimonials.css">
</head>

<body class="page-testimonials">
    <div class="nav-container">
        <nav aria-label="Main navigation">
            <div class="leftNav">
                <svg class="nav-icon" aria-hidden="true"><use href="img/icons.svg#planet"></use></svg>
                <a href="main.html">YOUNIVERSES</a>
            </div>
            <div class="centralNav">
                <ul>
                    <li><a href="main.html">Home</a></li>
                    <li><a href="services.html">Book Online</a></li>
                    <li><a href="blog.html">Blog</a></li>
                    <li><a href="testimonials.html" aria-current="page">Testimonials</a></li>
                </ul>
            </div>
        </nav>
    </div>

    <div class="desktop-content">
        <main class="testimonials-page">
            <div class="lp-wrap">
                <h1 id="testimonials-heading" class="page-heading">Testimonials</h1>
                <p class="testimonials-lead">
                    Stories from the work — submitted and reviewed before publishing.
                </p>
                <div class="testimonials-list" aria-live="polite">
                    <!-- Populated by js/testimonials.js -->
                </div>
                <div class="form-band" aria-labelledby="share-heading">
                    <form class="testimonial-form" action="https://api.web3forms.com/submit" method="POST">
                        <h2 id="share-heading" class="panel-title">Share Yours</h2>
                        <input type="hidden" name="subject" value="New Youniverse Testimonial">
                        <div class="form-honeypot" aria-hidden="true">
                            <label for="botcheck">Leave empty</label>
                            <input type="checkbox" name="botcheck" id="botcheck" tabindex="-1" autocomplete="off">
                        </div>
                        <div class="form-group">
                            <label for="name">Name</label>
                            <input type="text" id="name" name="name" required maxlength="100" autocomplete="name">
                        </div>
                        <div class="form-group">
                            <label for="quote">Testimonial</label>
                            <textarea id="quote" name="message" required maxlength="1000" rows="3"></textarea>
                        </div>
                        <button type="submit" class="form-submit">Submit for Review</button>
                        <p class="form-status" role="status"></p>
                    </form>
                </div>
            </div>
        </main>
    </div>

    <script src="js/config.js"></script>
    <script src="js/nav.js"></script>
    <script src="js/blog.js"></script>
    <script src="js/testimonials.js"></script>
    <script src="js/cards.js"></script>
</body>

</html>
